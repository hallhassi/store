<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Storefront</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=Abt9w5UJ8Kt5llcvSSSpjR5QfkT3OHBYV0U4uytXODmMdyM8YL0UwRIHUyLhtoMXnPwgHIu6qwjlfW3n&currency=USD"></script>
    <style>
        .hidden { display: none; }
        img { width: 100px; display: block; }
        #admin-bar, #cart-bar { position: sticky; top: 0; background: white; border-bottom: 1px solid #ccc; padding: 5px; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

<div id="admin-bar" class="hidden">
    <span>admin</span>
    <button onclick="triggerUpload()">upload</button>
    <button onclick="saveAll()">save</button>
    <input type="file" id="upload-input" multiple accept="image/*" style="display:none" onchange="handleUpload(this.files)">
</div>

<div id="cart-bar">
    <span id="cart-count">cart(0)</span>
    <div id="payment-buttons" class="hidden">
        <button id="btn-card" onclick="startCheckout('card')"></button>
        <button id="btn-paypal" onclick="startCheckout('paypal')"></button>
    </div>
</div>

<div id="store-front">
    <div id="product-list"></div>
</div>

<script>
const db = supabase.createClient(
    'https://numeejvkeadsucxwsecn.supabase.co',
    'sb_publishable_oVLDp_xdbMLQ1rYjIJm-nQ_WRQfhfXC'
);

const FLAT_PRICE = 0.67;
let inventory = [];
let cart = {};
let deletedIds = new Set();
let newProducts = [];
let pendingEdits = {};

async function init() {
    const isAdmin = !!localStorage.getItem('admin_key');
    if (isAdmin) document.getElementById('admin-bar').classList.remove('hidden');

    let productsReq = await db.from('products')
        .select('id, title, img_url, created_at, sold')
        .order('created_at', { ascending: false });

    if (productsReq.error) return;
    inventory = productsReq.data || [];
    render();
}

function renderProduct(product) {
    const isAdmin = !!localStorage.getItem('admin_key');
    const isSold = product.sold === true;
    const inCart = !!cart[product.id];
    
    const div = document.createElement('div');
    if (deletedIds.has(product.id)) div.style.opacity = '0.3';

    if (product.img_url) {
        const img = document.createElement('img');
        img.src = `/.netlify/images?url=${encodeURIComponent(product.img_url)}&w=300&fit=contain`;
        div.appendChild(img);
    }

    const titleInput = document.createElement('input');
    titleInput.value = product.title ?? '';
    titleInput.readOnly = !isAdmin;
    if (isAdmin) titleInput.oninput = (e) => trackEdit(product, 'title', e.target.value);
    div.appendChild(titleInput);

    if (isAdmin) {
        const delBtn = document.createElement('button');
        delBtn.textContent = deletedIds.has(product.id) ? 'undo' : 'del';
        delBtn.onclick = () => {
            deletedIds.has(product.id) ? deletedIds.delete(product.id) : deletedIds.add(product.id);
            render();
        };
        div.appendChild(delBtn);
    } else {
        const buyBtn = document.createElement('button');
        if (isSold) {
            buyBtn.textContent = 'sold';
            buyBtn.disabled = true;
        } else {
            buyBtn.textContent = inCart ? 'remove' : 'buy';
            buyBtn.onclick = () => inCart ? updateQty(product.id, 0) : addToCart(product.id);
        }
        div.appendChild(buyBtn);
    }
    return div;
}

function render() {
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    const allProducts = [...newProducts.map((p, i) => ({ ...p, _newIndex: i })), ...inventory];
    
    allProducts.forEach(p => list.appendChild(renderProduct(p)));
    updateCartBar();
}

function updateCartBar() {
    const count = Object.keys(cart).length;
    document.getElementById('cart-count').textContent = `cart(${count})`;
    
    const btnContainer = document.getElementById('payment-buttons');
    if (count > 0) {
        btnContainer.classList.remove('hidden');
        const subtotal = count * FLAT_PRICE;
        const cardTotal = (subtotal + 0.30) / (1 - 0.029);
        const paypalTotal = (subtotal + 0.49) / (1 - 0.044);
        
        document.getElementById('btn-card').textContent = `pay $${cardTotal.toFixed(2)} with credit card`;
        document.getElementById('btn-paypal').textContent = `pay $${paypalTotal.toFixed(2)} with paypal`;
    } else {
        btnContainer.classList.add('hidden');
    }
}

async function startCheckout(method) {
    const res = await fetch('/.netlify/functions/create-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cart, method }),
    });
    const data = await res.json();

    if (method === 'card' && data.url) {
        window.location.href = data.url;
    } else if (method === 'paypal' && data.total) {
        // Since PayPal needs a specific flow, we trigger the popup 
        // with the calculated total from the server.
        renderPayPalPopup(data.total);
    }
}

function renderPayPalPopup(total) {
    // We temporarily show a container to mount the SDK button
    let container = document.getElementById('paypal-mount');
    if (!container) {
        container = document.createElement('div');
        container.id = 'paypal-mount';
        document.body.appendChild(container);
    }
    container.innerHTML = ''; 
    
    paypal.Buttons({
        createOrder: (data, actions) => {
            return actions.order.create({
                purchase_units: [{ amount: { value: total.toFixed(2) } }]
            });
        },
        onApprove: async (data, actions) => {
            await actions.order.capture();
            window.location.href = '/?session=success';
        }
    }).render('#paypal-mount').then(() => {
        // Click the invisible button automatically to start the flow
        const btn = container.querySelector('[role="link"], .paypal-button');
        if (btn) btn.click();
    });
}

function addToCart(id) { cart[id] = { qty: 1 }; render(); }
function updateQty(id, qty) { if (qty > 0) cart[id].qty = 1; else delete cart[id]; render(); }
function triggerUpload() { document.getElementById('upload-input').click(); }
function trackEdit(product, field, value) { 
    if (product.id) { if (!pendingEdits[product.id]) pendingEdits[product.id] = {}; pendingEdits[product.id][field] = value; }
    else { newProducts[product._newIndex][field] = value; }
}

async function saveAll() {
    const key = localStorage.getItem('admin_key');
    const promises = [];
    Object.entries(pendingEdits).forEach(([id, fields]) => {
        if (!deletedIds.has(id)) promises.push(fetch('/.netlify/functions/manage-products', { method: 'POST', body: JSON.stringify({ key, data: { id, ...fields } }) }));
    });
    newProducts.forEach(p => { if (p.title) promises.push(fetch('/.netlify/functions/manage-products', { method: 'POST', body: JSON.stringify({ key, data: p }) })); });
    deletedIds.forEach(id => promises.push(fetch('/.netlify/functions/manage-products', { method: 'DELETE', body: JSON.stringify({ key, data: { id } }) })));
    await Promise.all(promises);
    location.reload();
}

init();
</script>
</body>
</html>
