<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Storefront</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://www.paypal.com/sdk/js?client-id=Abt9w5UJ8Kt5llcvSSSpjR5QfkT3OHBYV0U4uytXODmMdyM8YL0UwRIHUyLhtoMXnPwgHIu6qwjlfW3n&currency=USD"></script>
  <style>
    .hidden { display: none; }
    img { width: auto; height: auto; max-width: 100%; }
    .out-of-stock { color: #888; text-decoration: line-through; }
    .admin-tools { background: #f4f4f4; padding: 5px; margin: 5px 0; font-size: .8em; }
    .admin-tools .danger { color: red; }
    .product-card { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .product-images { margin-bottom: 10px; }
    .buy-controls { margin-top: 5px; }
    .form-row { display: block; margin: 6px 0; }
    .form-row label { display: inline-block; min-width: 120px; }
    .form-row input[type="text"],
    .form-row input[type="number"] { width: 200px; }
  </style>
</head>
<body>

  <!-- ── Admin bar ─────────────────────────────────────────────────── -->
  <div id="admin-panel" class="hidden">
    <button data-action="show-create-form">+ add new product</button>
    <button data-action="logout">logout</button>
  </div>

  <!-- ── Admin form (fields injected by buildAdminForm()) ──────────── -->
  <div id="admin-form-container" class="hidden">
    <h3>add/edit product</h3>
    <div id="admin-form-fields"><!-- schema-driven fields go here --></div>
    <br>
    <button data-action="save-product">save product</button>
    <button data-action="cancel-form">cancel</button>
  </div>

  <!-- ── Storefront ────────────────────────────────────────────────── -->
  <div id="store-front">
    <h3 id="store-header">03/16/26</h3>
    <ul id="product-list"></ul>
  </div>

  <!-- ── Cart ──────────────────────────────────────────────────────── -->
  <div id="cart-wrapper" class="hidden">

    <div>
      <h3>shipping</h3>
      <!-- region radios injected by buildCartOptions() -->
      <ul id="region-list"></ul>
    </div>

    <div>
      <h3>payment</h3>
      <!-- method radios injected by buildCartOptions() -->
      <ul id="method-list"></ul>
    </div>

    <div id="total-section" class="hidden">
      <h3>total</h3>
      <ul id="summary-list"></ul>
    </div>

    <div id="checkout-section" class="hidden">
      <h3>checkout</h3>
      <ul>
        <li><button data-action="checkout">checkout</button></li>
        <li id="paypal-button-container" class="hidden"></li>
      </ul>
    </div>

  </div>

  <!-- ── Modules (ES module graph) ─────────────────────────────────── -->
  <script type="module" src="./app.js"></script>

</body>
</html>
