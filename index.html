<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Storefront</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=Abt9w5UJ8Kt5llcvSSSpjR5QfkT3OHBYV0U4uytXODmMdyM8YL0UwRIHUyLhtoMXnPwgHIu6qwjlfW3n&currency=USD"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="admin-panel" class="hidden">
    <section>
        <p>Bulk Upload (Each photo = 1 Product)</p>
        <input type="file" id="bulk-images" multiple accept="image/*">
        <button onclick="handleBulkUpload()">Upload & Create Products</button>
        <button onclick="logout()">logout</button>
    </section>
</div>

<div id="store-front">
    <h3 id="store-header">03/15/26</h3>
    <ul id="product-list"></ul>
</div>

<div id="cart-wrapper" class="hidden">
    <section>
        <h3>shipping</h3>
        <ul>
            <li><input type="radio" id="usa" name="region" value="usa" onclick="updateTotal()"><label for="usa">USA</label></li>
            <li><input type="radio" id="canada" name="region" value="canada" onclick="updateTotal()"><label for="canada">Canada</label></li>
            <li><input type="radio" id="intl" name="region" value="row" onclick="updateTotal()"><label for="intl">Rest of World</label></li>
        </ul>
    </section>

    <section>
        <h3>payment</h3>
        <ul>
            <li><input type="radio" id="pay_paypal" name="method" value="paypal" onclick="updateTotal()"><label for="pay_paypal">PayPal</label></li>
            <li><input type="radio" id="pay_zelle" name="method" value="zelle" onclick="updateTotal()"><label for="pay_zelle">Zelle</label></li>
            <li><input type="radio" id="pay_card" name="method" value="card" onclick="updateTotal()"><label for="pay_card">Credit Card</label></li>
        </ul>
    </section>

    <section id="total-section" class="hidden">
        <h3>total</h3>
        <ul id="summary-list"></ul>
    </section>

    <section id="checkout-section" class="hidden">
        <h3>checkout</h3>
        <ul>
            <li><button onclick="handleCheckout()">checkout</button></li>
            <li id="paypal-button-container" class="hidden"></li>
        </ul>
    </section>
</div>

<script>
    const db = supabase.createClient('https://numeejvkeadsucxwsecn.supabase.co', 'sb_publishable_oVLDp_xdbMLQ1rYjIJm-nQ_WRQfhfXC');
    let inventory = [];
    let cart = {}; 

    // --- Initialization ---
    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('session') === 'success') {
            localStorage.removeItem('cart'); 
            cart = {};
            alert('order received. thank you.');
            window.history.replaceState({}, document.title, "/");
        }

        const adminKey = localStorage.getItem('admin_key');
        if (adminKey) document.getElementById('admin-panel').classList.remove('hidden');
        
        const [productsReq, ratesReq] = await Promise.all([
            db.from('products').select('*').order('created_at', { ascending: false }),
            db.from('shipping_rates').select('*')
        ]);

        inventory = productsReq.data || [];
        window.allRates = ratesReq.data || []; 
        render();
    }

    // --- Logic & Calculations ---
    function calculateLocally() {
        const region = document.querySelector('input[name="region"]:checked')?.value;
        const method = document.querySelector('input[name="method"]:checked')?.value;
        if (Object.keys(cart).length === 0 || !region || !method) return null;

        let subtotal = 0, totalGrams = 0, breakdown = [];

        Object.keys(cart).forEach(id => {
            const product = inventory.find(p => p.id === id);
            if (product) {
                const itemTotal = product.price * cart[id].qty;
                subtotal += itemTotal;
                totalGrams += (product.weight * cart[id].qty);
                breakdown.push(`$${itemTotal} ${product.title}`);
            }
        });

        const weightLbs = (totalGrams / 453.592) * 1.2;
        let shipping = 0;
        // Simplified shipping logic placeholder
        shipping = region === 'usa' ? 5.00 : 15.00; 

        breakdown.push(`$${shipping.toFixed(2)} shipping`);
        let total = subtotal + shipping;
        if (method === 'card') total = (total + 0.30) / (1 - 0.029);
        if (method === 'paypal') total = (total + 0.49) / (1 - 0.044);
        
        return { total, breakdown };
    }

    // --- UI Rendering ---
    function render() {
        const list = document.getElementById('product-list');
        const isAdmin = !!localStorage.getItem('admin_key');

        list.innerHTML = inventory.map(product => {
            const inCart = cart[product.id];
            
            // Unified UI: Both admin and user see the same product card
            return `
<li id="p-${product.id}">
    <img src="${product.image_url}" id="img-${product.id}">
    
    <div>
        <input type="text" value="${product.title}" onchange="updateProductField('${product.id}', 'title', this.value)" ${!isAdmin ? 'disabled' : ''}>
        <input type="number" value="${product.price}" onchange="updateProductField('${product.id}', 'price', this.value)" ${!isAdmin ? 'disabled' : ''}>
        
        ${isAdmin ? `
            <div class="admin-actions">
                <button onclick="document.getElementById('edit-file-${product.id}').click()">Change Photo</button>
                <input type="file" id="edit-file-${product.id}" class="hidden" accept="image/*" onchange="replaceProductImage('${product.id}', this.files[0])">
                <button onclick="deleteProduct('${product.id}')" style="color:red">Delete</button>
            </div>
        ` : ''}
    </div>

    ${!isAdmin ? `<button onclick="addToCart('${product.id}')">${inCart ? 'In Cart' : 'Buy'}</button>` : ''}
</li>
            `;
        }).join('');
    }

    // --- Admin Functions ---
    async function handleBulkUpload() {
        const files = document.getElementById('bulk-images').files;
        if (!files.length) return;

        for (const file of files) {
            const fileName = `${Date.now()}-${file.name}`;
            const { data, error } = await db.storage.from('product-media').upload(`products/${fileName}`, file);
            
            if (data) {
                const { data: { publicUrl } } = db.storage.from('product-media').getPublicUrl(`products/${fileName}`);
                
                // Create a new product entry for each image
                await fetch('/.netlify/functions/manage-products', {
                    method: 'POST',
                    body: JSON.stringify({
                        key: localStorage.getItem('admin_key'),
                        data: { title: 'New Product', price: 0, stock: 1, weight: 100, image_url: publicUrl }
                    })
                });
            }
        }
        location.reload();
    }

    async function updateProductField(id, field, value) {
        const product = inventory.find(p => p.id === id);
        product[field] = value;

        await fetch('/.netlify/functions/manage-products', {
            method: 'POST',
            body: JSON.stringify({
                key: localStorage.getItem('admin_key'),
                data: product
            })
        });
    }

    async function deleteProduct(id) {
        if (!confirm('Delete?')) return;
        await fetch('/.netlify/functions/manage-products', {
            method: 'DELETE',
            body: JSON.stringify({ key: localStorage.getItem('admin_key'), data: { id } })
        });
        location.reload();
    }

    // --- Cart Management ---
    function addToCart(id) {
        cart[id] = { qty: 1 };
        document.getElementById('cart-wrapper').classList.remove('hidden');
        render();
        updateTotal();
    }

    function updateTotal() {
        const result = calculateLocally();
        if (!result) return;
        document.getElementById('summary-list').innerHTML = result.breakdown.map(l => `<li>${l}</li>`).join('') + `<li>Total: $${result.total.toFixed(2)}</li>`;
        document.getElementById('total-section').classList.remove('hidden');
        document.getElementById('checkout-section').classList.remove('hidden');
    }

    function logout() {
        localStorage.removeItem('admin_key');
        location.reload();
    }


    // --- Image Replacement Logic ---
    async function replaceProductImage(id, file) {
        if (!file) return;

        const btn = event.target.previousElementSibling;
        const originalText = btn.innerText;
        btn.innerText = 'Uploading...';
        btn.disabled = true;

        try {
            // 1. Upload new image to Supabase Storage
            const fileName = `products/${Date.now()}-${file.name}`;
            const { data, error } = await db.storage
                .from('product-media')
                .upload(fileName, file);

            if (error) throw error;

            // 2. Get the new Public URL
            const { data: { publicUrl } } = db.storage
                .from('product-media')
                .getPublicUrl(fileName);

            // 3. Update the database via the Netlify function
            const res = await fetch('/.netlify/functions/manage-products', {
                method: 'POST',
                body: JSON.stringify({
                    key: localStorage.getItem('admin_key'),
                    data: { id, image_url: publicUrl }
                })
            });

            if (res.ok) {
                // Update the UI locally without a full reload
                document.getElementById(`img-${id}`).src = publicUrl;
                alert('Photo updated!');
            }
        } catch (err) {
            console.error(err);
            alert('Upload failed: ' + err.message);
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    // --- Helper for other field updates (Title, Price, etc.) ---
    async function updateProductField(id, field, value) {
        const payload = { id };
        payload[field] = value;

        await fetch('/.netlify/functions/manage-products', {
            method: 'POST',
            body: JSON.stringify({
                key: localStorage.getItem('admin_key'),
                data: payload
            })
        });
        // Silent update - no alert needed for text fields
    }

    init();
</script>
</body>
</html>
