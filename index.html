<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Storefront</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=Abt9w5UJ8Kt5llcvSSSpjR5QfkT3OHBYV0U4uytXODmMdyM8YL0UwRIHUyLhtoMXnPwgHIu6qwjlfW3n&currency=USD"></script>
    <style>
        .hidden { display: none; }
        body, input, button { background: black; color: white;}
    </style>
</head>
<body>

<div id="admin-panel" class="hidden">
    <section style="border: 2px dashed #ccc; padding: 20px; margin-bottom: 20px;">
        <p><strong>Bulk Upload</strong></p>
        <input type="file" id="bulk-images" multiple accept="image/*" onchange="previewFiles()">
        <div id="upload-preview-area"></div>
        <button id="save-all-btn" class="hidden" onclick="processBulkUpload()">Upload & Save All Products</button>
        <button onclick="logout()">logout</button>
    </section>
</div>

<div id="store-front">
    <h3 id="store-header">03/15/26</h3>
    <ul id="product-list"></ul>
</div>

<div id="cart-wrapper" class="hidden">
    <section>
        <h3>shipping</h3>
        <ul>
            <li><input type="radio" id="usa" name="region" value="usa" onclick="updateTotal()"><label for="usa">USA</label></li>
            <li><input type="radio" id="canada" name="region" value="canada" onclick="updateTotal()"><label for="canada">Canada</label></li>
            <li><input type="radio" id="intl" name="region" value="row" onclick="updateTotal()"><label for="intl">Rest of World</label></li>
        </ul>
    </section>

    <section>
        <h3>payment</h3>
        <ul>
            <li><input type="radio" id="pay_paypal" name="method" value="paypal" onclick="updateTotal()"><label for="pay_paypal">PayPal</label></li>
            <li><input type="radio" id="pay_zelle" name="method" value="zelle" onclick="updateTotal()"><label for="pay_zelle">Zelle</label></li>
            <li><input type="radio" id="pay_card" name="method" value="card" onclick="updateTotal()"><label for="pay_card">Credit Card</label></li>
        </ul>
    </section>

    <section id="total-section" class="hidden">
        <h3>total</h3>
        <ul id="summary-list"></ul>
    </section>

    <section id="checkout-section" class="hidden">
        <h3>checkout</h3>
        <ul>
            <li><button onclick="handleCheckout()">checkout</button></li>
            <li id="paypal-button-container" class="hidden"></li>
        </ul>
    </section>
</div>

<script>const db = supabase.createClient('https://numeejvkeadsucxwsecn.supabase.co', 'sb_publishable_oVLDp_xdbMLQ1rYjIJm-nQ_WRQfhfXC');
    let inventory = [];
    let cart = {}; 

    // --- Initialization ---
    async function init() {
        // Set the header date as requested
        document.getElementById('store-header').innerText = "12-31-26";

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('session') === 'success') {
            localStorage.removeItem('cart'); 
            cart = {};
            alert('order received. thank you.');
            window.history.replaceState({}, document.title, "/");
        }

        const adminKey = localStorage.getItem('admin_key');
        if (adminKey) document.getElementById('admin-panel').classList.remove('hidden');
        
        const [productsReq, ratesReq] = await Promise.all([
            db.from('products').select('*').order('created_at', { ascending: false }),
            db.from('shipping_rates').select('*')
        ]);

        inventory = productsReq.data || [];
        window.allRates = ratesReq.data || []; 
        render();
    }

    // --- UI Rendering ---
    function render() {
        const list = document.getElementById('product-list');
        const isAdmin = !!localStorage.getItem('admin_key');

        list.innerHTML = inventory.map(product => {
            const inCart = cart[product.id];
            const isNew = !!product.isNew;
            
            // Fix 404: If image_url is missing/undefined, use a placeholder or empty string
            const imgSrc = product.image_url || '';
            
            return `
                <li id="p-${product.id}" style="border-bottom: 1px solid #333; padding: 10px 0; list-style: none;">
                    ${imgSrc ? `<img src="${imgSrc}" style="max-width: 200px; display: block; margin-bottom: 10px;">` : ''}
                    <div>
                        <input type="text" placeholder="Title" value="${product.title || ''}" 
                            onchange="updateProductField('${product.id}', 'title', this.value)" ${!isAdmin ? 'disabled' : ''}>
                        
                        <input type="number" placeholder="Price" value="${product.price || 0}" 
                            onchange="updateProductField('${product.id}', 'price', this.value)" ${!isAdmin ? 'disabled' : ''}>
                        
                        <span>Stock:</span>
                        <input type="number" value="${product.stock || 1}" 
                            onchange="updateProductField('${product.id}', 'stock', this.value)" ${!isAdmin ? 'disabled' : ''}>
                    </div>
                    ${isAdmin ? `
                        ${isNew ? `<button onclick="saveNewProduct('${product.id}')" style="background: green; color: white;">Save to Store</button>` : ''}
                        <button onclick="deleteProduct('${product.id}', ${isNew})">Delete</button>
                    ` : `
                        <button onclick="addToCart('${product.id}')">${inCart ? 'In Cart' : 'Buy'}</button>
                    `}
                </li>
            `;
        }).join('');
    }

    // --- Admin Logic: Preview & Upload ---

    async function previewFiles() {
        const files = document.getElementById('bulk-images').files;
        if (!files.length) return;

        for (const file of files) {
            // 1. Upload immediately to get the URL
            const fileName = `${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '_')}`;
            const { data, error } = await db.storage.from('product-media').upload(`products/${fileName}`, file);

            if (data) {
                const { data: { publicUrl } } = db.storage.from('product-media').getPublicUrl(`products/${fileName}`);
                
                // 2. Add to inventory array as a "New" product
                const tempProduct = {
                    id: 'temp-' + Math.random().toString(36).substr(2, 9),
                    title: file.name.split('.')[0], // Use filename as default title
                    price: 0,
                    stock: 1,
                    weight: 100,
                    image_url: publicUrl,
                    isNew: true
                };

                inventory.unshift(tempProduct); // Put at the top
                render(); // Re-render so you can edit it
            }
        }
    }

    async function saveNewProduct(tempId) {
        const product = inventory.find(p => p.id === tempId);
        const { id, isNew, ...saveData } = product; // Remove temp ID and flag

        const response = await fetch('/.netlify/functions/manage-products', {
            method: 'POST',
            body: JSON.stringify({
                key: localStorage.getItem('admin_key'),
                data: saveData
            })
        });

        if (response.ok) {
            alert('Saved to database');
            location.reload(); 
        }
    }

    async function updateProductField(id, field, value) {
        const product = inventory.find(p => p.id === id);
        product[field] = (field === 'price' || field === 'stock') ? parseFloat(value) : value;

        if (product.isNew) return; // Don't sync to DB until "Save" is clicked

        await fetch('/.netlify/functions/manage-products', {
            method: 'POST',
            body: JSON.stringify({
                key: localStorage.getItem('admin_key'),
                data: product
            })
        });
    }

    async function deleteProduct(id, isNew) {
        if (!confirm('Delete?')) return;
        if (isNew) {
            inventory = inventory.filter(p => p.id !== id);
            render();
            return;
        }
        await fetch('/.netlify/functions/manage-products', {
            method: 'DELETE',
            body: JSON.stringify({ key: localStorage.getItem('admin_key'), data: { id } })
        });
        location.reload();
    }

    // --- Standard Functions ---
    function addToCart(id) {
        cart[id] = { qty: 1 };
        document.getElementById('cart-wrapper').classList.remove('hidden');
        render();
        updateTotal();
    }

    function updateTotal() {
        const result = calculateLocally(); // Using your existing calculation logic
        if (!result) return;
        document.getElementById('summary-list').innerHTML = result.breakdown.map(l => `<li>${l}</li>`).join('') + `<li>Total: $${result.total.toFixed(2)}</li>`;
        document.getElementById('total-section').classList.remove('hidden');
        document.getElementById('checkout-section').classList.remove('hidden');
    }

    function logout() {
        localStorage.removeItem('admin_key');
        location.reload();
    }

    init();
</script>
</body>
</html>
