<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Storefront</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden { display: none; }
        img { width: 100px; display: block; }
    </style>
</head>
<body>

<header id="main-header"></header>

<div id="store-front">
    <div id="product-list"></div>
</div>

<script>
const db = supabase.createClient(
    'https://numeejvkeadsucxwsecn.supabase.co',
    'sb_publishable_oVLDp_xdbMLQ1rYjIJm-nQ_WRQfhfXC'
);

// Configuration
const ADMIN_PASS = "admin123"; 
const BUYER_PASS = "shop456"; 

let inventory = [];
let cart = {};
let deletedIds = new Set();
let newProducts = [];
let pendingEdits = {};

async function init() {
    updateHeader();
    
    let productsReq = await db.from('products')
        .select('id, title, img_url, created_at, sold, price')
        .order('created_at', { ascending: false });

    if (productsReq.error) return;
    inventory = productsReq.data || [];
    render();
}

function updateHeader() {
    const header = document.getElementById('main-header');
    const adminKey = localStorage.getItem('admin_key');
    const buyerKey = localStorage.getItem('buyer_key');
    header.innerHTML = '';

    // Subtle Login Input (No context/labels)
    const authInput = document.createElement('input');
    authInput.type = 'password';
    authInput.onkeydown = (e) => {
        if (e.key === 'Enter') {
            if (authInput.value === ADMIN_PASS) {
                localStorage.setItem('admin_key', authInput.value);
                location.reload();
            } else if (authInput.value === BUYER_PASS) {
                localStorage.setItem('buyer_key', authInput.value);
                location.reload();
            }
        }
    };

    if (!adminKey && !buyerKey) {
        header.appendChild(authInput);
        return;
    }

    const logoutBtn = document.createElement('button');
    logoutBtn.textContent = 'logout';
    logoutBtn.onclick = () => { 
        localStorage.removeItem('admin_key'); 
        localStorage.removeItem('buyer_key'); 
        location.reload(); 
    };

    if (adminKey) {
        const label = document.createElement('span');
        label.textContent = 'admin';
        const upBtn = document.createElement('button');
        upBtn.textContent = 'upload';
        upBtn.onclick = () => document.getElementById('upload-input').click();
        const saveBtn = document.createElement('button');
        saveBtn.textContent = 'save';
        saveBtn.onclick = saveAll;
        const fileInput = document.createElement('input');
        fileInput.type = 'file'; fileInput.id = 'upload-input';
        fileInput.multiple = true; fileInput.accept = 'image/*';
        fileInput.className = 'hidden';
        fileInput.onchange = (e) => handleUpload(e.target.files);
        header.append(label, upBtn, saveBtn, logoutBtn, fileInput);
    } else {
        const count = Object.keys(cart).length;
        const label = document.createElement('span');
        label.textContent = `cart(${count})`;
        header.appendChild(label);

        if (count > 0) {
            let subtotal = 0;
            Object.keys(cart).forEach(id => {
                const item = inventory.find(p => p.id === id);
                if (item) subtotal += parseFloat(item.price || 0);
            });
            const cardTotal = (subtotal + 0.30) / (1 - 0.029);
            const payBtn = document.createElement('button');
            payBtn.textContent = `pay $${cardTotal.toFixed(2)} with credit card`;
            payBtn.onclick = startStripeCheckout;
            header.appendChild(payBtn);
        }
        header.appendChild(logoutBtn);
    }
}

function renderProduct(product) {
    const isAdmin = !!localStorage.getItem('admin_key');
    const isBuyer = !!localStorage.getItem('buyer_key');
    const inCart = !!cart[product.id];
    const isDeleted = deletedIds.has(product.id);
    const isSold = product.sold === true;

    const div = document.createElement('div');
    if (isDeleted || inCart) div.style.opacity = '0.3';

    if (product.img_url) {
        const img = document.createElement('img');
        img.src = `/.netlify/images?url=${encodeURIComponent(product.img_url)}&w=300&fit=contain`;
        div.appendChild(img);
    }

    const titleInput = document.createElement('input');
    titleInput.value = product.title ?? '';
    titleInput.readOnly = !isAdmin;
    if (isAdmin) titleInput.oninput = (e) => trackEdit(product, 'title', e.target.value);
    div.appendChild(titleInput);

    if (isAdmin) {
        // Admin also gets a price input
        const priceInput = document.createElement('input');
        priceInput.type = 'number';
        priceInput.step = '0.01';
        priceInput.value = product.price ?? 0;
        priceInput.oninput = (e) => trackEdit(product, 'price', e.target.value);
        div.appendChild(priceInput);

        const delBtn = document.createElement('button');
        delBtn.textContent = isDeleted ? 'undo' : 'del';
        delBtn.onclick = () => {
            isDeleted ? deletedIds.delete(product.id) : deletedIds.add(product.id);
            render();
        };
        div.appendChild(delBtn);
    } else if (isBuyer) {
        const priceSpan = document.createElement('span');
        priceSpan.textContent = ` $${parseFloat(product.price || 0).toFixed(2)} `;
        div.appendChild(priceSpan);

        if (!isSold) {
            const buyBtn = document.createElement('button');
            buyBtn.textContent = inCart ? 'undo' : 'buy';
            buyBtn.onclick = () => inCart ? updateQty(product.id, 0) : addToCart(product.id);
            div.appendChild(buyBtn);
        } else {
            const soldBtn = document.createElement('button');
            soldBtn.textContent = 'sold';
            soldBtn.disabled = true;
            div.appendChild(soldBtn);
        }
    }
    return div;
}

function render() {
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    const allProducts = [...newProducts.map((p, i) => ({ ...p, _newIndex: i })), ...inventory];
    allProducts.forEach(p => list.appendChild(renderProduct(p)));
}

function addToCart(id) { cart[id] = { qty: 1 }; updateHeader(); render(); }
function updateQty(id, qty) { if (qty > 0) cart[id].qty = 1; else delete cart[id]; updateHeader(); render(); }

async function startStripeCheckout() {
    const res = await fetch('/.netlify/functions/create-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cart, method: 'card' }),
    });
    const data = await res.json();
    if (data.url) window.location.href = data.url;
}

function trackEdit(product, field, value) { 
    if (product.id) { 
        if (!pendingEdits[product.id]) pendingEdits[product.id] = {}; 
        pendingEdits[product.id][field] = value; 
    } else { 
        newProducts[product._newIndex][field] = value; 
    }
}

async function handleUpload(files) {
    for (const file of Array.from(files)) {
        const ext = file.name.split('.').pop();
        const filePath = `covers/${Math.random()}-${Date.now()}.${ext}`;
        await db.storage.from('product-media').upload(filePath, file);
        const { data: { publicUrl } } = db.storage.from('product-media').getPublicUrl(filePath);
        newProducts.unshift({ title: '', sold: false, price: 0, img_url: publicUrl });
    }
    render();
}

async function saveAll() {
    const key = localStorage.getItem('admin_key');
    const promises = [];
    Object.entries(pendingEdits).forEach(([id, fields]) => {
        if (!deletedIds.has(id)) promises.push(fetch('/.netlify/functions/manage-products', { method: 'POST', body: JSON.stringify({ key, data: { id, ...fields } }) }));
    });
    newProducts.forEach(p => { if (p.title) promises.push(fetch('/.netlify/functions/manage-products', { method: 'POST', body: JSON.stringify({ key, data: p }) })); });
    deletedIds.forEach(id => promises.push(fetch('/.netlify/functions/manage-products', { method: 'DELETE', body: JSON.stringify({ key, data: { id } }) })));
    await Promise.all(promises);
    location.reload();
}

init();
</script>
</body>
</html>
