<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Storefront</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=Abt9w5UJ8Kt5llcvSSSpjR5QfkT3OHBYV0U4uytXODmMdyM8YL0UwRIHUyLhtoMXnPwgHIu6qwjlfW3n&currency=USD"></script>
    <style>
        .hidden { display: none; }
        img { width: 100px; display: block; }
    </style>
</head>
<body>
    
<div id="admin-bar">
    <span id="header-type"></span>
    <span id="admin-controls" class="hidden">
        <button onclick="triggerUpload()">upload</button>
        <button onclick="saveAll()">save</button>
    </span>
    <input type="file" id="upload-input" multiple accept="image/*" style="display:none" onchange="handleUpload(this.files)">
</div>

<div id="store-front">
    <div id="product-list"></div>
</div>

<div id="cart-display"></div>

<script>
const db = supabase.createClient(
    'https://numeejvkeadsucxwsecn.supabase.co',
    'sb_publishable_oVLDp_xdbMLQ1rYjIJm-nQ_WRQfhfXC'
);

const FLAT_PRICE = 0.67;
let inventory = [];
let cart = {};
let deletedIds = new Set();
let newProducts = [];
let pendingEdits = {};

async function init() {
    // Admin check via URL param or existing localStorage only
    const isAdmin = !!localStorage.getItem('admin_key');
    if (isAdmin) {
        document.getElementById('header-type').textContent = 'admin';
        document.getElementById('admin-controls').classList.remove('hidden');
    }

    let productsReq = await db.from('products')
        .select('id, title, img_url, created_at, sold')
        .order('created_at', { ascending: false });

    if (productsReq.error) return;
    inventory = productsReq.data || [];
    render();
}

function formatDate(dateStr) {
    if (!dateStr) return 'new';
    return new Date(dateStr).toLocaleDateString('en-CA').slice(2);
}

function renderProduct(product) {
    const isAdmin = !!localStorage.getItem('admin_key');
    const isSold = product.sold === true;
    const inCart = !!cart[product.id];
    const isDeleted = deletedIds.has(product.id);

    const div = document.createElement('div');
    if (isDeleted) div.style.opacity = '0.3';

    if (product.img_url) {
        const img = document.createElement('img');
        img.src = `/.netlify/images?url=${encodeURIComponent(product.img_url)}&w=300&fit=contain`;
        div.appendChild(img);
    }

    const titleInput = document.createElement('input');
    titleInput.value = product.title ?? '';
    
    if (isAdmin) {
        titleInput.oninput = (e) => trackEdit(product, 'title', e.target.value);
        div.appendChild(titleInput);
        const delBtn = document.createElement('button');
        delBtn.textContent = isDeleted ? 'undo' : 'del';
        delBtn.onclick = () => {
            if (product.id) {
                isDeleted ? deletedIds.delete(product.id) : deletedIds.add(product.id);
            } else {
                newProducts.splice(product._newIndex, 1);
            }
            render();
        };
        div.appendChild(delBtn);
    } else {
        titleInput.readOnly = true;
        div.appendChild(titleInput);

        const buyBtn = document.createElement('button');
        if (isSold) {
            buyBtn.textContent = 'sold';
            buyBtn.disabled = true;
        } else {
            buyBtn.textContent = inCart ? 'remove' : 'buy';
            buyBtn.onclick = () => inCart ? updateQty(product.id, 0) : addToCart(product.id);
        }
        div.appendChild(buyBtn);
    }
    return div;
}

function render() {
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    const allProducts = [...newProducts.map((p, i) => ({ ...p, _newIndex: i })), ...inventory];
    let lastDate = null;

    allProducts.forEach(p => {
        const currentDate = formatDate(p.created_at);
        if (currentDate !== lastDate) {
            const dateHead = document.createElement('h3');
            dateHead.textContent = currentDate;
            list.appendChild(dateHead);
            lastDate = currentDate;
        }
        list.appendChild(renderProduct(p));
    });
    renderCart();
}

function renderCart() {
    const container = document.getElementById('cart-display');
    const cartIds = Object.keys(cart);
    
    if (cartIds.length === 0) {
        container.innerHTML = '';
        return;
    }

    let subtotal = cartIds.length * FLAT_PRICE;
    let cardTotal = (subtotal + 0.30) / (1 - 0.029);
    let paypalTotal = (subtotal + 0.49) / (1 - 0.044);

    let html = '<ul>';
    cartIds.forEach(id => {
        const item = inventory.find(p => p.id === id);
        html += `<li>$0.67 ${item?.title || 'Item'}</li>`;
    });
    html += `<li>subtotal: $${subtotal.toFixed(2)}</li>`;
    html += `<li><button onclick="startCheckout('card')">pay $${cardTotal.toFixed(2)} with credit card</button></li>`;
    html += `<li><button onclick="startCheckout('paypal')">pay $${paypalTotal.toFixed(2)} with paypal</button></li>`;
    html += '</ul>';
    
    container.innerHTML = html;
}

function startCheckout(method) {
    if (method === 'paypal') {
        // Trigger invisible PayPal flow or redirect
        handleCheckout('paypal');
    } else {
        handleCheckout('card');
    }
}

async function handleCheckout(method) {
    const res = await fetch('/.netlify/functions/create-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cart, method }),
    });
    const data = await res.json();
    if (data.url) window.location.href = data.url;
}

function trackEdit(product, field, value) {
    if (product.id) {
        if (!pendingEdits[product.id]) pendingEdits[product.id] = {};
        pendingEdits[product.id][field] = value;
    } else {
        newProducts[product._newIndex][field] = value;
    }
}

function triggerUpload() { document.getElementById('upload-input').click(); }

async function handleUpload(files) {
    for (const file of Array.from(files)) {
        try {
            const ext = file.name.split('.').pop();
            const filePath = `covers/${Math.random()}-${Date.now()}.${ext}`;
            await db.storage.from('product-media').upload(filePath, file);
            const { data: { publicUrl } } = db.storage.from('product-media').getPublicUrl(filePath);
            newProducts.unshift({ title: '', sold: false, img_url: publicUrl });
            render();
        } catch (e) { alert("error: " + e.message); }
    }
}

async function saveAll() {
    const key = localStorage.getItem('admin_key');
    const promises = [];
    Object.entries(pendingEdits).forEach(([id, fields]) => {
        if (deletedIds.has(id)) return;
        promises.push(fetch('/.netlify/functions/manage-products', {
            method: 'POST',
            body: JSON.stringify({ key, data: { id, ...fields } }),
        }));
    });
    newProducts.forEach(p => {
        if (!p.title) return; 
        promises.push(fetch('/.netlify/functions/manage-products', {
            method: 'POST',
            body: JSON.stringify({ key, data: p }),
        }));
    });
    deletedIds.forEach(id => {
        promises.push(fetch('/.netlify/functions/manage-products', {
            method: 'DELETE',
            body: JSON.stringify({ key, data: { id } }),
        }));
    });
    await Promise.all(promises);
    location.reload();
}

function addToCart(id) {
    cart[id] = { qty: 1 };
    render();
}

function updateQty(id, qty) {
    if (parseInt(qty) > 0) cart[id].qty = 1; else delete cart[id];
    render();
}

init();
</script>
</body>
</html>
