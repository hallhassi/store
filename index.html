<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Storefront</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=Abt9w5UJ8Kt5llcvSSSpjR5QfkT3OHBYV0U4uytXODmMdyM8YL0UwRIHUyLhtoMXnPwgHIu6qwjlfW3n&currency=USD"></script>
    <style>
        .hidden { display: none; }
        img { width: 100px; display: block; }
        #admin-bar { position: sticky; top: 0; background: white; }
    </style>
</head>
<body>
    
<div id="admin-bar" class="hidden">
    <span>admin</span>
    <button id="btn-upload" onclick="triggerUpload()">upload</button>
    <button id="btn-save" onclick="saveAll()">save</button>
    <button onclick="logout()">logout</button>
    <input type="file" id="upload-input" multiple accept="image/*" style="display:none" onchange="handleUpload(this.files)">
</div>

<div id="store-front">
    <div id="product-list"></div>
</div>

<div id="cart-wrapper" class="hidden">
    <div>
        <h3>payment</h3>
        <input type="radio" id="pay_paypal" name="method" value="paypal" onclick="updateTotal()"><label for="pay_paypal">PayPal</label>
        <input type="radio" id="pay_zelle" name="method" value="zelle" onclick="updateTotal()"><label for="pay_zelle">Zelle</label>
        <input type="radio" id="pay_card" name="method" value="card" onclick="updateTotal()"><label for="pay_card">Credit Card</label>
    </div>
    <div id="total-section" class="hidden">
        <h3>total</h3>
        <ul id="summary-list"></ul>
    </div>
    <div id="checkout-section" class="hidden">
        <h3>checkout</h3>
        <button onclick="handleCheckout()">checkout</button>
        <div id="paypal-button-container" class="hidden"></div>
    </div>
</div>

<script>
const db = supabase.createClient(
    'https://numeejvkeadsucxwsecn.supabase.co',
    'sb_publishable_oVLDp_xdbMLQ1rYjIJm-nQ_WRQfhfXC'
);

const FLAT_PRICE = 0.67;

let inventory = [];
let cart = {};
let deletedIds = new Set();
let newProducts = [];
let pendingEdits = {};

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('session') === 'success') {
        localStorage.removeItem('cart');
        cart = {};
        alert('order received');
        window.history.replaceState({}, document.title, '/');
    }

    const adminKey = localStorage.getItem('admin_key');
    if (adminKey) document.getElementById('admin-bar').classList.remove('hidden');

    let productsReq = await db.from('products')
        .select('id, title, img_url, created_at, sold')
        .order('created_at', { ascending: false });

    if (productsReq.error) return;
    inventory = productsReq.data || [];
    render();
}

function formatDate(dateStr) {
    if (!dateStr) return 'new';
    return new Date(dateStr).toLocaleDateString('en-CA').slice(2);
}

function renderProduct(product) {
    const isAdmin = !!localStorage.getItem('admin_key');
    const inCart = cart[product.id];
    const isDeleted = deletedIds.has(product.id);
    const isSold = product.sold === true;

    const div = document.createElement('div');
    if (isDeleted) div.style.opacity = '0.3';

    if (product.img_url) {
        const img = document.createElement('img');
        img.src = `/.netlify/images?url=${encodeURIComponent(product.img_url)}&w=300&fit=contain`;
        div.appendChild(img);
    }

    if (isAdmin) {
        const titleInput = document.createElement('input');
        titleInput.value = product.title ?? '';
        titleInput.oninput = (e) => trackEdit(product, 'title', e.target.value);
        div.appendChild(titleInput);

        const soldLabel = document.createElement('label');
        const soldCheck = document.createElement('input');
        soldCheck.type = 'checkbox';
        soldCheck.checked = isSold;
        soldCheck.onchange = (e) => trackEdit(product, 'sold', e.target.checked);
        soldLabel.appendChild(soldCheck);
        soldLabel.append(" sold");
        div.appendChild(soldLabel);

        const delBtn = document.createElement('button');
        delBtn.textContent = isDeleted ? 'undo' : 'del';
        delBtn.onclick = () => {
            if (product.id) {
                isDeleted ? deletedIds.delete(product.id) : deletedIds.add(product.id);
            } else {
                newProducts.splice(product._newIndex, 1);
            }
            render();
        };
        div.appendChild(delBtn);
    } else {
        const title = document.createElement('div');
        title.textContent = product.title;
        div.appendChild(title);

        const priceDisplay = document.createElement('div');
        priceDisplay.textContent = `$${FLAT_PRICE.toFixed(2)}`;
        div.appendChild(priceDisplay);

        const buyBtn = document.createElement('button');
        if (isSold) {
            buyBtn.textContent = 'sold';
            buyBtn.disabled = true;
        } else {
            buyBtn.textContent = inCart ? 'remove' : 'buy';
            buyBtn.onclick = () => inCart ? updateQty(product.id, 0) : addToCart(product.id);
        }
        div.appendChild(buyBtn);
    }
    return div;
}

function render() {
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    const allProducts = [...newProducts.map((p, i) => ({ ...p, _newIndex: i })), ...inventory];
    let lastDate = null;

    allProducts.forEach(p => {
        const currentDate = formatDate(p.created_at);
        if (currentDate !== lastDate) {
            const dateHead = document.createElement('h3');
            dateHead.textContent = currentDate;
            list.appendChild(dateHead);
            lastDate = currentDate;
        }
        list.appendChild(renderProduct(p));
    });
}

function trackEdit(product, field, value) {
    if (product.id) {
        if (!pendingEdits[product.id]) pendingEdits[product.id] = {};
        pendingEdits[product.id][field] = value;
    } else {
        newProducts[product._newIndex][field] = value;
    }
}

function triggerUpload() { document.getElementById('upload-input').click(); }

async function handleUpload(files) {
    for (const file of Array.from(files)) {
        try {
            const ext = file.name.split('.').pop();
            const filePath = `covers/${Math.random()}-${Date.now()}.${ext}`;
            await db.storage.from('product-media').upload(filePath, file);
            const { data: { publicUrl } } = db.storage.from('product-media').getPublicUrl(filePath);
            newProducts.unshift({ title: '', sold: false, img_url: publicUrl });
            render();
        } catch (e) { alert("error: " + e.message); }
    }
}

async function saveAll() {
    const key = localStorage.getItem('admin_key');
    const promises = [];

    Object.entries(pendingEdits).forEach(([id, fields]) => {
        if (deletedIds.has(id)) return;
        promises.push(fetch('/.netlify/functions/manage-products', {
            method: 'POST',
            body: JSON.stringify({ key, data: { id, ...fields } }),
        }));
    });

    newProducts.forEach(p => {
        if (!p.title) return; 
        promises.push(fetch('/.netlify/functions/manage-products', {
            method: 'POST',
            body: JSON.stringify({ key, data: p }),
        }));
    });

    deletedIds.forEach(id => {
        promises.push(fetch('/.netlify/functions/manage-products', {
            method: 'DELETE',
            body: JSON.stringify({ key, data: { id } }),
        }));
    });

    await Promise.all(promises);
    location.reload();
}

function addToCart(id) {
    document.getElementById('cart-wrapper').classList.remove('hidden');
    cart[id] = { qty: 1 };
    render();
    updateTotal();
}

function updateQty(id, qty) {
    if (parseInt(qty) > 0) cart[id].qty = 1; else delete cart[id];
    render();
    updateTotal();
}

function calculateLocally() {
    const method = document.querySelector('input[name="method"]:checked')?.value;
    if (Object.keys(cart).length === 0 || !method) return null;

    let subtotal = Object.keys(cart).length * FLAT_PRICE;
    let total = subtotal;
    if (method === 'card') total = (total + 0.30) / (1 - 0.029);
    if (method === 'paypal') total = (total + 0.49) / (1 - 0.044);

    const breakdown = [`subtotal: $${subtotal.toFixed(2)}`, `fee: $${(total - subtotal).toFixed(2)}` ];
    return { total, breakdown };
}

function updateTotal() {
    const result = calculateLocally();
    const totalSection = document.getElementById('total-section');
    const checkoutSection = document.getElementById('checkout-section');
    const paypalContainer = document.getElementById('paypal-button-container');
    const method = document.querySelector('input[name="method"]:checked')?.value;

    if (!result) {
        totalSection.classList.add('hidden');
        checkoutSection.classList.add('hidden');
        return;
    }

    document.getElementById('summary-list').innerHTML = result.breakdown.map(l => `<li>${l}</li>`).join('') + `<li>total: $${result.total.toFixed(2)}</li>`;
    totalSection.classList.remove('hidden');
    checkoutSection.classList.remove('hidden');

    if (method === 'paypal') {
        paypalContainer.classList.remove('hidden');
        renderPayPal();
    } else {
        paypalContainer.classList.add('hidden');
    }
}

async function handleCheckout() {
    const method = document.querySelector('input[name="method"]:checked')?.value;
    if (method === 'zelle') {
        alert('zelle details...');
        return;
    }
    const res = await fetch('/.netlify/functions/create-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cart, method }),
    });
    const data = await res.json();
    if (data.url) window.location.href = data.url;
}

function renderPayPal() {
    const container = document.getElementById('paypal-button-container');
    container.innerHTML = '';
    paypal.Buttons({
        createOrder: async (data, actions) => {
            const response = await fetch('/.netlify/functions/create-checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cart, method: 'paypal' }),
            });
            const result = await response.json();
            return actions.order.create({ purchase_units: [{ amount: { value: result.total.toFixed(2) } }] });
        },
        onApprove: async (data, actions) => {
            await actions.order.capture();
            window.location.href = '/?session=success';
        },
    }).render('#paypal-button-container');
}

function logout() {
    localStorage.removeItem('admin_key');
    location.reload();
}

init();
</script>
</body>
</html>
