<div id="store-front">
  <h3 id="store-header">store</h3>
  <ul id="product-list"></ul>
</div>

<div id="cart-wrapper" style="display: none;">
  <div>
    <h3>shipping</h3>
    <ul>
      <li><input type="radio" id="usa" name="shipping_type" data-region="usa" onclick="calculateTotals()"><label for="usa">USA</label></li>
      <li><input type="radio" id="canada" name="shipping_type" data-region="canada" onclick="calculateTotals()"><label for="canada">Canada</label></li>
      <li><input type="radio" id="intl" name="shipping_type" data-region="row" onclick="calculateTotals()"><label for="intl">Rest of World</label></li>
    </ul>
  </div>

  <div>
    <h3>payment</h3>
    <ul>
      <li><input type="radio" id="pay_paypal" name="pay_method" value="paypal" onclick="calculateTotals()"><label for="pay_paypal">PayPal</label></li>
      <li><input type="radio" id="pay_zelle" name="pay_method" value="zelle" onclick="calculateTotals()"><label for="pay_zelle">Zelle</label></li>
      <li><input type="radio" id="pay_card" name="pay_method" value="card" onclick="calculateTotals()"><label for="pay_card">Credit Card</label></li>
    </ul>
  </div>

  <div id="total-section" style="display: none;">
    <h3>total</h3>
    <ul id="summary-list">
      </ul>
  </div>

  <div id="checkout-section" style="display: none;">
    <h3>checkout</h3>
    <ul>
      <li><button onclick="alert('Proceeding to checkout...')">checkout</button></li>
    </ul>
  </div>
</div>

<script>
const products = {
  'altcomics 7': { price: 8, weight: 77 },
  'altcomics 4': { price: 8, weight: 59.8 },
  'young lions': { price: 50, weight: 192 },
  'the whale': { price: 15, weight: 98 },
  'jaywalk 6': { price: 15, weight: 218 },
  'comics youth': { price: 5, weight: 30 },
  '2001': { price: 25, weight: 468 },
  'mirror mirror': { price: 30, weight: 440 }
};

const intlRates = [
  { limit: 0.5, canada: 12.99, row: 14.99 },
  { limit: 1.0, canada: 14.99, row: 18.99 },
  { limit: 2.0, canada: 18.99, row: 22.99 },
  { limit: 3.0, canada: 22.99, row: 29.99 },
  { limit: 4.0, canada: 29.99, row: 38.99 }
];

const pkgMultiplier = 1.2; 
let cart = {};
let hasStartedShopping = false;

function renderStore() {
  const list = document.getElementById('product-list');
  list.innerHTML = '';
  for (const [name, info] of Object.entries(products)) {
    const li = document.createElement('li');
    if (cart[name]) {
      li.innerHTML = `<button onclick="removeFromCart('${name}')">remove</button> <input type="number" value="${cart[name].qty}" min="1" style="width: 40px;" onchange="updateQty('${name}', this.value)"> $${info.price} ${name}`;
    } else {
      li.innerHTML = `<button onclick="addToCart('${name}')">buy</button> $${info.price} ${name}`;
    }
    list.appendChild(li);
  }
}

function addToCart(name) {
  if (!hasStartedShopping) {
    hasStartedShopping = true;
    document.getElementById('cart-wrapper').style.display = 'block';
  }
  cart[name] = { qty: 1 };
  renderStore();
  calculateTotals();
}

function updateQty(name, newQty) {
  const qty = parseInt(newQty);
  if (qty > 0) cart[name].qty = qty;
  else delete cart[name];
  renderStore();
  calculateTotals();
}

function removeFromCart(name) {
  delete cart[name];
  renderStore();
  calculateTotals();
}

function calculateTotals() {
  const summaryList = document.getElementById('summary-list');
  summaryList.innerHTML = ''; // Clear previous summary
  
  let subtotal = 0;
  let totalGrams = 0;
  
  // 1. LIST INDIVIDUAL ITEMS
  for (const [name, item] of Object.entries(cart)) {
    const itemPrice = products[name].price;
    const itemTotal = itemPrice * item.qty;
    subtotal += itemTotal;
    totalGrams += (products[name].weight * item.qty);

    const li = document.createElement('li');
    li.innerText = `$${itemTotal} ${item.qty}x ${name}`;
    summaryList.appendChild(li);
  }

  const weightLbs = (totalGrams / 453.592) * pkgMultiplier;
  const selectedShipping = document.querySelector('input[name="shipping_type"]:checked');
  const selectedPayment = document.querySelector('input[name="pay_method"]:checked');
  
  // 2. SHIPPING CALCULATION
  let shippingCost = 0;
  if (selectedShipping && Object.keys(cart).length > 0) {
    const region = selectedShipping.getAttribute('data-region');
    if (selectedShipping.id === 'usa') {
      const roundedWeight = Math.ceil(weightLbs);
      shippingCost = 4.47 + (Math.max(0, roundedWeight - 1) * 0.75);
    } else {
      let remainingWeight = weightLbs;
      while (remainingWeight > 0) {
        const currentBoxWeight = Math.min(remainingWeight, 4);
        const tier = intlRates.find(r => currentBoxWeight <= r.limit);
        shippingCost += tier ? tier[region] : intlRates[intlRates.length - 1][region];
        remainingWeight -= currentBoxWeight;
      }
    }
    const shipLi = document.createElement('li');
    shipLi.innerText = `$${shippingCost.toFixed(2)} shipping`;
    summaryList.appendChild(shipLi);
  }

  // 3. FEE CALCULATION
  let fee = 0;
  const preFeeTotal = subtotal + shippingCost;
  if (selectedPayment) {
    const method = selectedPayment.value;
    if (method === 'paypal') fee = (preFeeTotal * 0.044) + 0.49;
    else if (method === 'card') fee = (preFeeTotal * 0.029) + 0.30;
    else fee = 0;
    
    const feeLi = document.createElement('li');
    feeLi.innerText = `$${fee.toFixed(2)} fee`;
    summaryList.appendChild(feeLi);
  }

  // 4. TOTAL AND VISIBILITY
  if (selectedShipping && selectedPayment && Object.keys(cart).length > 0) {
    const totalLi = document.createElement('li');
    totalLi.innerText = `$${(preFeeTotal + fee).toFixed(2)} total`;
    summaryList.appendChild(totalLi);
    
    document.getElementById('total-section').style.display = 'block';
    document.getElementById('checkout-section').style.display = 'block';
  } else {
    document.getElementById('total-section').style.display = Object.keys(cart).length > 0 ? 'block' : 'none';
    document.getElementById('checkout-section').style.display = 'none';
  }
}

renderStore();
</script>
