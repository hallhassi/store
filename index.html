<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Storefront</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=Abt9w5UJ8Kt5llcvSSSpjR5QfkT3OHBYV0U4uytXODmMdyM8YL0UwRIHUyLhtoMXnPwgHIu6qwjlfW3n&currency=USD"></script>
    <style>
        .hidden { display: none; }
        #admin-bar { position: sticky; top: 0; }
    </style>
</head>
<body>

<!-- ── Admin Bar (sticky, shown only when logged in) ── -->
<div id="admin-bar" class="hidden">
    <span>admin</span>
    <button id="btn-upload" onclick="triggerUpload()">upload</button>
    <button id="btn-delete" onclick="toggleDeleteMode()">delete</button>
    <button id="btn-save" onclick="saveAll()">save</button>
    <button onclick="logout()" style="margin-left: auto;">logout</button>
    <input type="file" id="upload-input" multiple accept="image/*" style="display:none" onchange="handleUpload(this.files)">
</div>

<!-- ── Store Header ── -->
<div id="store-front">
    <h3 id="store-header"></h3>
    <ul id="product-list"></ul>
</div>

<!-- ── Cart / Checkout ── -->
<div id="cart-wrapper" class="hidden">
    <div>
        <h3>shipping</h3>
        <ul>
            <li><input type="radio" id="usa" name="region" value="usa" onclick="updateTotal()"><label for="usa">USA</label></li>
            <li><input type="radio" id="canada" name="region" value="canada" onclick="updateTotal()"><label for="canada">Canada</label></li>
            <li><input type="radio" id="intl" name="region" value="row" onclick="updateTotal()"><label for="intl">Rest of World</label></li>
        </ul>
    </div>
    <div>
        <h3>payment</h3>
        <ul>
            <li><input type="radio" id="pay_paypal" name="method" value="paypal" onclick="updateTotal()"><label for="pay_paypal">PayPal</label></li>
            <li><input type="radio" id="pay_zelle" name="method" value="zelle" onclick="updateTotal()"><label for="pay_zelle">Zelle</label></li>
            <li><input type="radio" id="pay_card" name="method" value="card" onclick="updateTotal()"><label for="pay_card">Credit Card</label></li>
        </ul>
    </div>
    <div id="total-section" class="hidden">
        <h3>total</h3>
        <ul id="summary-list"></ul>
    </div>
    <div id="checkout-section" class="hidden">
        <h3>checkout</h3>
        <ul>
            <li><button onclick="handleCheckout()">checkout</button></li>
            <li id="paypal-button-container" class="hidden"></li>
        </ul>
    </div>
</div>

<script>

// ════════════════════════════════════════════════
// SCHEMA
// Defines field name, display label, type, and
// whether it is editable by admin.
// ════════════════════════════════════════════════
const SCHEMA = [
    { key: 'id',         label: 'ID',     type: 'text',   editable: false },
    { key: 'title',      label: 'Title',  type: 'text',   editable: true  },
    { key: 'price',      label: 'Price',  type: 'number', editable: true  },
    { key: 'weight',     label: 'Weight', type: 'number', editable: true  },
    { key: 'img_url', label: 'Image', type: 'text', editable: true },
    { key: 'date',       label: 'Date',   type: 'text',   editable: true  },
];


// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
const db = supabase.createClient(
    'https://numeejvkeadsucxwsecn.supabase.co',
    'sb_publishable_oVLDp_xdbMLQ1rYjIJm-nQ_WRQfhfXC'
);

let inventory     = [];
let cart          = {};
let deleteMode    = false;
let deletedIds    = new Set();
let newProducts   = [];


// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
async function init() {
    const urlParams = new URLSearchParams(window.location.search);

    if (urlParams.get('session') === 'success') {
        localStorage.removeItem('cart');
        cart = {};
        const msg = document.createElement('p');
        msg.innerHTML = '<strong>order received. thank you.</strong>';
        document.body.prepend(msg);
        window.history.replaceState({}, document.title, '/');
    }

    const today = new Date();
    const yy = String(today.getFullYear()).slice(2);
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('store-header').textContent = `${yy}-${mm}-${dd}`;

    const adminKey = localStorage.getItem('admin_key');
    if (adminKey) {
        document.getElementById('admin-bar').classList.remove('hidden');
    }

    let productsQuery = db.from('products').select('id, title, price, weight, img_url, date').order('date', { ascending: false });
    if (!adminKey) {
        productsQuery = productsQuery.eq('is_public', true);
    }

    const [productsReq, ratesReq] = await Promise.all([
        productsQuery,
        db.from('shipping_rates').select('*'),
    ]);

    if (productsReq.error || ratesReq.error) return;

    inventory      = productsReq.data || [];
    window.allRates = ratesReq.data   || [];

    render();
}


// ════════════════════════════════════════════════
// RENDER
// One function for every product, public and admin.
// ════════════════════════════════════════════════
function getCdnUrl(url, width) {
    return `/.netlify/images?url=${encodeURIComponent(url)}&w=${width}&fit=contain`;
}

function renderProduct(product) {
    const isAdmin     = !!localStorage.getItem('admin_key');
    const isNew       = !product.id;
    const isDeleted   = deletedIds.has(product.id);
    const inCart      = cart[product.id];
    const liId        = product.id ? `product-${product.id}` : `product-new-${product._newIndex}`;

    const li = document.createElement('li');
    li.className = 'product-item' + (isDeleted ? ' marked-for-deletion' : '');
    li.id = liId;

    if (isAdmin && deleteMode && product.id) {
        li.style.cursor = 'pointer';
        li.onclick = () => toggleDeletion(product.id);
    }

    SCHEMA.forEach(field => {
        if (field.key === 'id') return;

        if (field.key === 'img_url') {
            const url = product.img_url;
            if (url) {
                const img = document.createElement('img');
                img.src     = getCdnUrl(url, 300);
                img.loading = 'lazy';
                li.appendChild(img);
            }
            if (isAdmin && field.editable) {
                const input = document.createElement('input');
                input.type        = 'text';
                input.value       = url ?? '';
                input.placeholder = field.label;
                input.dataset.productId = product.id || '';
                input.dataset.newIndex  = product._newIndex ?? '';
                input.dataset.field     = field.key;
                input.dataset.fieldType = field.type;
                input.oninput = (e) => handleFieldEdit(e, product);
                li.appendChild(input);
            }
            return;
        }

        const label = document.createElement('div');
        label.className = 'field-label';
        label.textContent = field.label;

        if (isAdmin && field.editable) {
            const input = document.createElement('input');
            input.type        = field.type === 'number' ? 'number' : 'text';
            input.value       = product[field.key] ?? '';
            input.placeholder = field.label;
            input.dataset.productId = product.id    || '';
            input.dataset.newIndex  = product._newIndex ?? '';
            input.dataset.field     = field.key;
            input.dataset.fieldType = field.type;
            input.oninput = (e) => handleFieldEdit(e, product);
            li.appendChild(label);
            li.appendChild(input);
        } else {
            const span = document.createElement('div');
            if (field.key === 'price') {
                span.textContent = `$${product.price}`;
            } else if (field.key === 'title') {
                span.textContent = product.title;
            } else {
                span.textContent = product[field.key] ?? '';
            }
            if (!isAdmin) li.appendChild(label);
            li.appendChild(span);
        }
    });

    if (!isAdmin) {
        const buyWrap = document.createElement('div');
        buyWrap.style.marginTop = '8px';
        if (!product.stock || product.stock <= 0) {
            buyWrap.innerHTML = `<button disabled>out of stock</button>`;
        } else if (inCart) {
            buyWrap.innerHTML = `
                <button onclick="updateQty('${product.id}', 0)">remove</button>
                ${product.stock > 1
                    ? `<input type="number" value="${inCart.qty}" min="1" max="${product.stock}" style="width:40px;" onchange="updateQty('${product.id}', this.value)">`
                    : ''}`;
        } else {
            buyWrap.innerHTML = `<button onclick="addToCart('${product.id}')">buy</button>`;
        }
        li.appendChild(buyWrap);
    }

    return li;
}

function render() {
    const list = document.getElementById('product-list');
    list.innerHTML = '';

    const allProducts = [
        ...inventory,
        ...newProducts.map((p, i) => ({ ...p, _newIndex: i })),
    ];

    allProducts.forEach(p => list.appendChild(renderProduct(p)));
}


// ════════════════════════════════════════════════
// FIELD EDITING
// Keep pending edits in-memory until save.
// ════════════════════════════════════════════════
let pendingEdits = {};

function handleFieldEdit(e, product) {
    const field     = e.target.dataset.field;
    const fieldType = e.target.dataset.fieldType;
    const rawVal    = e.target.value;
    const value     = fieldType === 'number' ? parseFloat(rawVal) : rawVal;

    if (product.id) {
        if (!pendingEdits[product.id]) pendingEdits[product.id] = {};
        pendingEdits[product.id][field] = value;
    } else {
        newProducts[product._newIndex][field] = value;
    }
}


// ════════════════════════════════════════════════
// ADMIN: UPLOAD
// Creates one new in-memory product per image.
// ════════════════════════════════════════════════
function triggerUpload() {
    document.getElementById('upload-input').click();
}

async function handleUpload(files) {
    for (const file of Array.from(files)) {
        const url      = await uploadSingleImage(file);
        const today    = new Date();
        const yy       = String(today.getFullYear()).slice(2);
        const mm       = String(today.getMonth() + 1).padStart(2, '0');
        const dd       = String(today.getDate()).padStart(2, '0');
        const newEntry = {
            title:   '',
            price:   '',
            weight:  '',
            img_url: url,
            date:    `${yy}-${mm}-${dd}`,
        };
        newProducts.push(newEntry);
    }
    render();
}

async function uploadSingleImage(file) {
    const ext      = file.name.split('.').pop();
    const filePath = `covers/${Math.random()}-${Date.now()}.${ext}`;
    const { error } = await db.storage.from('product-media').upload(filePath, file);
    if (error) throw error;
    const { data: { publicUrl } } = db.storage.from('product-media').getPublicUrl(filePath);
    return publicUrl;
}


// ════════════════════════════════════════════════
// ADMIN: DELETE MODE
// Toggle; clicking a product marks/unmarks it.
// ════════════════════════════════════════════════
function toggleDeleteMode() {
    deleteMode = !deleteMode;
    document.getElementById('btn-delete').classList.toggle('active', deleteMode);
    render();
}

function toggleDeletion(id) {
    if (!deleteMode) return;
    if (deletedIds.has(id)) {
        deletedIds.delete(id);
    } else {
        deletedIds.add(id);
    }
    render();
}


// ════════════════════════════════════════════════
// ADMIN: SAVE
// Applies pending edits, inserts new products,
// and deletes marked products via Netlify function.
// ════════════════════════════════════════════════
async function saveAll() {
    const btn = document.getElementById('btn-save');
    btn.disabled   = true;
    btn.textContent = 'saving...';

    const key = localStorage.getItem('admin_key');

    try {
        const promises = [];

        Object.entries(pendingEdits).forEach(([id, fields]) => {
            promises.push(
                fetch('/.netlify/functions/manage-products', {
                    method: 'POST',
                    body: JSON.stringify({ key, data: { id, ...fields } }),
                })
            );
        });

        newProducts.forEach(p => {
            if (!p.title) return;
            promises.push(
                fetch('/.netlify/functions/manage-products', {
                    method: 'POST',
                    body: JSON.stringify({ key, data: p }),
                })
            );
        });

        deletedIds.forEach(id => {
            promises.push(
                fetch('/.netlify/functions/manage-products', {
                    method: 'DELETE',
                    body: JSON.stringify({ key, data: { id } }),
                })
            );
        });

        await Promise.all(promises);

        pendingEdits  = {};
        newProducts   = [];
        deletedIds    = new Set();
        deleteMode    = false;
        document.getElementById('btn-delete').classList.remove('active');

        location.reload();
    } catch (err) {
        alert('Save error: ' + err.message);
    } finally {
        btn.disabled   = false;
        btn.textContent = 'save';
    }
}


// ════════════════════════════════════════════════
// CART
// ════════════════════════════════════════════════
function addToCart(id) {
    document.getElementById('cart-wrapper').classList.remove('hidden');
    cart[id] = { qty: 1 };
    render();
    updateTotal();
}

function updateQty(id, qty) {
    const q = parseInt(qty);
    if (q > 0) cart[id].qty = q; else delete cart[id];
    render();
    updateTotal();
}


// ════════════════════════════════════════════════
// SHIPPING + TOTAL CALCULATION
// ════════════════════════════════════════════════
function calculateLocally() {
    const region = document.querySelector('input[name="region"]:checked')?.value;
    const method = document.querySelector('input[name="method"]:checked')?.value;

    if (Object.keys(cart).length === 0) return { total: 0, breakdown: [] };
    if (!region || !method || !window.allRates.length) return null;

    let subtotal    = 0;
    let totalGrams  = 0;
    const breakdown = [];

    Object.keys(cart).forEach(id => {
        const product = inventory.find(b => b.id === id);
        if (!product) return;
        const itemTotal  = product.price * cart[id].qty;
        const qtyDisplay = cart[id].qty > 1 ? `${cart[id].qty}x ` : '';
        subtotal    += itemTotal;
        totalGrams  += product.weight * cart[id].qty;
        breakdown.push(`$${itemTotal} ${qtyDisplay}${product.title}`);
    });

    const weightLbs    = (totalGrams / 453.592) * 1.2;
    let shipping       = 0;
    const searchRegion = region.toLowerCase();

    if (searchRegion === 'usa') {
        const base  = window.allRates.find(r => r.region.toLowerCase() === 'usa' && r.is_base_rate);
        const extra = window.allRates.find(r => r.region.toLowerCase() === 'usa' && !r.is_base_rate);
        if (base && extra) {
            shipping = parseFloat(base.price) + (Math.max(0, Math.ceil(weightLbs) - 1) * parseFloat(extra.price));
        }
    } else {
        const regionTiers = window.allRates
            .filter(r => r.region.toLowerCase() === searchRegion)
            .sort((a, b) => a.weight_limit_lbs - b.weight_limit_lbs);
        let rem = weightLbs;
        while (rem > 0 && regionTiers.length > 0) {
            const tier = regionTiers.find(r => Math.min(rem, 4) <= r.weight_limit_lbs) || regionTiers[regionTiers.length - 1];
            shipping += parseFloat(tier.price);
            rem -= 4;
        }
    }

    breakdown.push(`$${shipping.toFixed(2)} shipping`);

    let total = subtotal + shipping;
    if (method === 'card')   total = (total + 0.30) / (1 - 0.029);
    if (method === 'paypal') total = (total + 0.49) / (1 - 0.044);

    const fee = total - (subtotal + shipping);
    if (fee > 0) breakdown.push(`$${fee.toFixed(2)} fee`);

    return { total, breakdown };
}


// ════════════════════════════════════════════════
// CHECKOUT UI
// ════════════════════════════════════════════════
function updateTotal() {
    const result          = calculateLocally();
    const totalSection    = document.getElementById('total-section');
    const checkoutSection = document.getElementById('checkout-section');
    const paypalContainer = document.getElementById('paypal-button-container');
    const checkoutBtn     = document.querySelector('#checkout-section button');
    const method          = document.querySelector('input[name="method"]:checked')?.value;

    if (!result || result.breakdown.length === 0) {
        totalSection.classList.add('hidden');
        checkoutSection.classList.add('hidden');
        paypalContainer.classList.add('hidden');
        return;
    }

    document.getElementById('summary-list').innerHTML =
        result.breakdown.map(l => `<li>${l}</li>`).join('') +
        `<li><strong>$${result.total.toFixed(2)} total</strong></li>`;

    totalSection.classList.remove('hidden');
    checkoutSection.classList.remove('hidden');

    if (method === 'paypal') {
        checkoutBtn.parentElement.classList.add('hidden');
        paypalContainer.classList.remove('hidden');
        renderPayPal();
    } else {
        checkoutBtn.parentElement.classList.remove('hidden');
        paypalContainer.classList.add('hidden');
    }
}

async function handleCheckout() {
    const region      = document.querySelector('input[name="region"]:checked')?.value;
    const method      = document.querySelector('input[name="method"]:checked')?.value;
    const checkoutBtn = document.querySelector('#checkout-section button');

    if (method === 'zelle') {
        const result = calculateLocally();
        alert(`Please Zelle $${result.total.toFixed(2)} to your@email.com`);
        return;
    }

    checkoutBtn.disabled   = true;
    checkoutBtn.innerText  = 'redirecting...';

    const res  = await fetch('/.netlify/functions/create-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cart, region, method }),
    });
    const data = await res.json();

    if (data.url) {
        window.location.href = data.url;
    } else {
        alert('Checkout failed: ' + (data.error || 'Unknown error'));
        checkoutBtn.disabled  = false;
        checkoutBtn.innerText = 'checkout';
    }
}

function renderPayPal() {
    const region    = document.querySelector('input[name="region"]:checked').value;
    const container = document.getElementById('paypal-button-container');
    container.innerHTML = '';

    paypal.Buttons({
        createOrder: async (data, actions) => {
            const response = await fetch('/.netlify/functions/create-checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cart, region, method: 'paypal' }),
            });
            const result = await response.json();
            return actions.order.create({
                purchase_units: [{ amount: { value: result.total.toString() } }],
            });
        },
        onApprove: async (data, actions) => {
            const order = await actions.order.capture();
            await fetch('/.netlify/functions/handle-purchase', {
                method: 'POST',
                body: JSON.stringify({ source: 'paypal', details: order, cart }),
            });
            window.location.href = '/?session=success';
        },
    }).render('#paypal-button-container');
}


// ════════════════════════════════════════════════
// ADMIN: AUTH
// ════════════════════════════════════════════════
function logout() {
    localStorage.removeItem('admin_key');
    window.location.href = '/';
}


init();
</script>
</body>
</html>
